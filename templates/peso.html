{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="box">
        <h1>Unit Converter</h1>
        <div class="tabs">
            <a href="/" class="active">Longitud</a>
            <a href="/peso">Peso</a>
            <a href="/temperatura">Temperatura</a>
        </div>

        <form method="POST">
            <label>Ingrese la longitud</label>
            <input type="number" step="any" name="valor" required>

            <label>Unidad origen</label>
            <select name="de">
                <option>mg</option>
                <option>g</option>
                <option>kg</option>
                <option>oz</option>
                <option>lb</option>
            </select>

            <label>Unidad destino</label>
            <select name="a">
                <option>mg</option>
                <option>g</option>
                <option>kg</option>
                <option>oz</option>
                <option>lb</option>
            </select>

            <button type="submit">Convert</button>
        </form>
    </div>

    <div class="box">
        <h1>Unit Converter</h1>
        <div class="tabs">
            <a href="/" class="active">Longitud</a>
            <a href="/peso">Peso</a>
            <a href="/temperatura">Temperatura</a>
        </div>

        {% if resultado is not none %}
            <p>Resultado de tu cálculo</p>
            <div class="result">{{ resultado|round(2) }}</div>
        {% endif %}
    </div>
</div>
{% endblock %}
